<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.png" type="image/png">
    <title>Dashboard</title>
</head>
<body>
    <aside id="sidebar">
        <section id="home">
            <h1>
                <a href="/">
                    <picture>
                        <source srcset="/assets/images/logo.svg">
                        <img src="/assets/images/logo.svg" alt="Dashboard Home">
                    </picture>
                </a>
            </h1>
        </section>

        <section id="main-pages">
            <a href="">
                <picture>
                    <source srcset="/assets/images/home_icon.svg">
                    <img src="assets/images/home_icon.svg" alt="Home">
                </picture>
                <p>Home</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/profile_icon.svg">
                    <img src="assets/images/profile_icon.svg" alt="Profile">
                </picture>
                <p>Profile</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/messages_icon.svg">
                    <img src="assets/images/messages_icon.svg" alt="Messages">
                </picture>
                <p>Messages</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/history_icon.svg">
                    <img src="assets/images/history_icon.svg" alt="History">
                </picture>
                <p>History</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/tasks_icon.svg">
                    <img src="assets/images/tasks_icon.svg" alt="Tasks">
                </picture>
                <p>Tasks</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/communities_icon.svg">
                    <img src="assets/images/communities_icon.svg" alt="Communities">
                </picture>
                <p>Communities</p>
            </a>
        </section>

        <section id="plumbing">
            <a href="">
                <picture>
                    <source srcset="assets/images/settings_icon.svg">
                    <img src="assets/images/settings_icon.svg" alt="Settings">
                </picture>
                <p>Settings</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/support_icon.svg">
                    <img src="assets/images/support_icon.svg" alt="Support">
                </picture>
                <p>Support</p>
            </a>

            <a href="">
                <picture>
                    <source srcset="assets/images/privacy_icon.svg">
                    <img src="assets/images/privacy_icon.svg" alt="Privacy">
                </picture>
                <p>Privacy</p>
            </a>
        </section>
    </aside>
    <header>
        <nav>
            <search>
                <form action="/search" method="get">
                    <label for="site-search">Search</label>
                    <input type="search"id="site-search" name="q" placeholder="Search..." required>
                    <button type="submit">Search</button>
                </form>
            </search>

            <section id="nav-right-side">
                <picture>
                    <source srcset="assets/images/bell_icon.svg">
                    <img src="assets/images/bell_icon.svg" alt="Notifications">
                </picture>
                <div id="profile-section">
                    <a href="">
                        <picture>
                            <source srcset="assets/images/personal_icon.svg">
                            <img src="assets/images/personal_icon.svg" alt="Profile">
                        </picture>
                        <p>Morgan Oakley</p>
                    </a>

                </div>
            </section>
        </nav>

    </header>

    <main>
        
        <article>

        </article>

    </main>

    <footer>
        <p>
            <a href="https://www.flaticon.com/free-icons/performance" title="performance icons">Performance icons created by zero_wing - Flaticon</a>
        </p>
    </footer>
    
</body>
</html>
